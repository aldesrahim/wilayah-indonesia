name: Monthly Release

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Create tag
        id: tag
        run: |
          TAG="v$(date -u +'%Y.%m')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "Region Data ${{ steps.tag.outputs.tag }}" \
            --notes "Generating data, please wait..." \
            --prerelease

      - name: Generate JSON
        run: node generate.js

      - name: Commit data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update region data (${{ steps.tag.outputs.tag }})"
          git push origin main

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" data/*.json
          gh release edit "${{ steps.tag.outputs.tag }}" \
            --notes "Auto-generated Indonesian region data." \
            --prerelease=false \
            --latest
